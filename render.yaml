services:
  - type: web
    name: infodigest-api
    runtime: node
    plan: free
    buildCommand: cd apps/api && pnpm install && pnpm prisma generate && pnpm build
    startCommand: cd apps/api && pnpm start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        fromDatabase:
          name: infodigest-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: infodigest-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false

databases:
  - name: infodigest-db
    plan: free
    databaseName: infodigest
    user: infodigest

redis:
  - name: infodigest-redis
    plan: free
    ipAllowList: []
