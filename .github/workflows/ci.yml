name: CI

on:
  push:
    tags-ignore:
      - '*'
  pull_request:

jobs:
  build-docs-site:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build docs
        run: pnpm docs:build

  build-api-image:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build API Docker image
        run: |
          docker build \
            -f apps/api/Dockerfile \
            -t infodigest-api-ci:$GITHUB_SHA \
            .

  build-web-image:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Web Docker image
        run: |
          docker build \
            -f apps/web/Dockerfile \
            --build-arg NEXT_PUBLIC_API_URL=https://example.com/api/v1 \
            -t infodigest-web-ci:$GITHUB_SHA \
            .
